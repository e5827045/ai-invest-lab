  <p class="lead">這是吸引用戶停留的工具頁。數字只是估算，不代表未來報酬。</p>
  <section class="calculator">
    <label>每月投入金額（NT$）<input id="monthly" type="number" value="10000"></label>

    <label>投資年數<input id="years" type="number" value="20"></label>
    <button class="btn primary" onclick="calculateCompound()">開始試算</button>
